name: Build VULCONHUB Images

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 1. Lowercase the owner name to avoid "repository name must be lowercase" error
      - name: Prepare Lowercase Image Name
        run: |
          OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_TAG=ghcr.io/${OWNER_LOWER}/vulnerable-container-hub:latest" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 2. Build and push, explicitly pointing to the Dockerfile
      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          # context: . means look in the root of the repo
          context: .
          # file: ./Dockerfile points exactly to your filename
          file: ./Dockerfile
          push: true
          tags: ${{ env.IMAGE_TAG }}
